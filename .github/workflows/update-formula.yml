name: Update Formula

on:
  repository_dispatch:
    types: [formula-update]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve formula target
        env:
          PAYLOAD_REPOSITORY: ${{ github.event.client_payload.repository }}
        run: |
          SOURCE_REPO="${PAYLOAD_REPOSITORY}"
          SOURCE_REPO="${SOURCE_REPO:?client_payload.repository (or repo/source_repo) is required}"

          FORMULA_NAME="${SOURCE_REPO##*/}"
          FORMULA="Formula/${FORMULA_NAME}.rb"

          [[ -f "$FORMULA" ]] || {
            echo "Expected formula file not found: $FORMULA"
            exit 1
          }

          echo "FORMULA_NAME=${FORMULA_NAME}" >> "$GITHUB_ENV"
          echo "FORMULA_PATH=${FORMULA}" >> "$GITHUB_ENV"

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256_MACOS_UNIVERSAL2: ${{ github.event.client_payload.sha256_macos_universal2 }}
          SHA256_MACOS_ARM64: ${{ github.event.client_payload.sha256_macos_arm64 }}
          SHA256_MACOS_INTEL: ${{ github.event.client_payload.sha256_macos_intel }}
          SHA256_LINUX_X86_64: ${{ github.event.client_payload.sha256_linux_x86_64 }}
          SHA256_LINUX_ARM64: ${{ github.event.client_payload.sha256_linux_arm64 }}
          SHA256_LINUX_ARMV7: ${{ github.event.client_payload.sha256_linux_armv7 }}
          FORMULA_NAME: ${{ env.FORMULA_NAME }}
          FORMULA_PATH: ${{ env.FORMULA_PATH }}
        run: |
          VERSION="${VERSION:?VERSION is required}"
          FORMULA_NAME="${FORMULA_NAME:?FORMULA_NAME is required}"
          FORMULA="${FORMULA_PATH:?FORMULA_PATH is required}"

          VERSION="${VERSION#v}"

          # Update version and sha256 landing zones
          python3 - <<'PYEOF'
          import os
          import re

          formula_path = os.environ["FORMULA_PATH"]
          version = os.environ["VERSION"]

          sha_env = {
              k: v for k, v in os.environ.items()
              if k.startswith("SHA256_") and v.strip()
          }

          patterns = [
              (re.compile(r"macos[-_]universal2|universal2", re.I), "macos_universal2"),
              (re.compile(r"darwin[-_](arm64|aarch64)", re.I), "macos_arm64"),
              (re.compile(r"darwin[-_](amd64|x86_64)|macos[-_](amd64|x86_64)", re.I), "macos_intel"),
              (re.compile(r"linux[-_](arm64|aarch64)|aarch64.*linux|arm64.*linux", re.I), "linux_arm64"),
              (re.compile(r"linux[-_](amd64|x86_64)|amd64.*linux|x86_64.*linux", re.I), "linux_x86_64"),
              (re.compile(r"armv7|eabihf|armhf", re.I), "linux_armv7"),
          ]

          def normalize_label(label):
              label = re.sub(r"[^a-z0-9]+", "_", label.strip().lower())
              label = re.sub(r"_+", "_", label).strip("_")
              return label

          def infer_target(url):
              if not url:
                  return None
              url = url.lower()
              for regex, target in patterns:
                  if regex.search(url):
                      return target
              return None

          with open(formula_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          updated_lines = []
          last_url = None
          pending_label = None
          for line in lines:
              stripped = line.strip()

              if stripped.startswith("# sha256:"):
                  pending_label = normalize_label(stripped.split(":", 1)[1])
                  updated_lines.append(line)
                  continue

              url_match = re.search(r'''url\s+["']([^"']+)["']''', line)
              if url_match:
                  last_url = url_match.group(1)
                  updated_lines.append(line)
                  continue

              sha_match = re.search(r'''(sha256\s+)(["'])([^"']{6,})(["'])''', line)
              if sha_match:
                  target = pending_label or infer_target(last_url)
                  if target:
                      env_key = "SHA256_" + target.upper()
                      if env_key in sha_env:
                          new_sha = sha_env[env_key]
                          line = (
                              sha_match.group(1)
                              + sha_match.group(2)
                              + new_sha
                              + sha_match.group(4)
                              + line[sha_match.end():]
                          )
                  pending_label = None
                  updated_lines.append(line)
                  continue

              updated_lines.append(line)
              pending_label = None

          version_re = re.compile(r'''^(version\s+["'])([^"']+)(["'])''')
          for idx, line in enumerate(updated_lines):
              version_match = version_re.match(line)
              if version_match:
                  updated_lines[idx] = (
                      version_match.group(1)
                      + version
                      + version_match.group(3)
                      + line[version_match.end():]
                  )

          with open(formula_path, "w", encoding="utf-8") as f:
              f.writelines(updated_lines)
          PYEOF

      - name: Create versioned formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          FORMULA_NAME: ${{ env.FORMULA_NAME }}
          FORMULA_PATH: ${{ env.FORMULA_PATH }}
        run: |
          VERSION="${VERSION#v}"
          FORMULA_NAME="${FORMULA_NAME:?FORMULA_NAME is required}"
          FORMULA="${FORMULA_PATH:?FORMULA_PATH is required}"
          VERSIONED_FORMULA="Formula/${FORMULA_NAME}@${VERSION}.rb"

          BASE_CLASS_NAME="$(awk '/^class .* < Formula$/ {print $2; exit}' "$FORMULA")"
          BASE_CLASS_NAME="${BASE_CLASS_NAME:?Could not determine formula class name}"

          # Homebrew convention: Example AT suffix for versioned formula classes.
          VERSION_NODOTS="${VERSION//./}"
          CLASS_NAME="${BASE_CLASS_NAME}AT${VERSION_NODOTS}"

          cp "$FORMULA" "$VERSIONED_FORMULA"
          sed -i "s/^class ${BASE_CLASS_NAME} < Formula$/class ${CLASS_NAME} < Formula/" "$VERSIONED_FORMULA"

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
          FORMULA_NAME: ${{ env.FORMULA_NAME }}
          FORMULA_PATH: ${{ env.FORMULA_PATH }}
        run: |
          VERSION="${VERSION#v}"
          FORMULA_NAME="${FORMULA_NAME:?FORMULA_NAME is required}"
          FORMULA="${FORMULA_PATH:?FORMULA_PATH is required}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA" Formula/"${FORMULA_NAME}"@*.rb
          git commit -m "chore: update ${FORMULA_NAME} to v${VERSION}"
          git push
